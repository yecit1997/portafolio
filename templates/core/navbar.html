{% load static %}
<nav class="navbar-custom">
    <div class="nav-container">
        <a href="{% url 'home' %}" class="nav-logo">
            <span class="logo-bracket">&lt;</span>
            <span class="logo-text">Dev</span>
            <span class="logo-slash">/</span>
            <span class="logo-name">Yecit</span>
            <span class="logo-bracket">&gt;</span>
        </a>
        
        <button class="nav-toggle" id="navToggle" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <div class="nav-menu" id="navMenu">
            <a href="{% url 'home' %}" class="nav-link">
                <span class="nav-icon"><i class="bi bi-house"></i></span>
                Inicio
            </a>
            <a href="{% url 'sobremi' %}" class="nav-link">
                <span class="nav-icon"><i class="bi bi-person"></i></span>
                Sobre mí
            </a>
            <a href="{% url 'home' %}#proyectos" class="nav-link">
                <span class="nav-icon"><i class="bi bi-folder"></i></span>
                Proyectos
            </a>
            <a href="{% url 'home' %}#tecnologias" class="nav-link">
                <span class="nav-icon"><i class="bi bi-stack"></i></span>
                Tech Stack
            </a>
            <a href="{% static 'pdf/cv/Hoja_Vida_Actual.pdf' %}" class="nav-link nav-link-cv" target="_blank">
                <span class="nav-icon"><i class="bi bi-download"></i></span>
                Descargar CV
            </a>
        </div>
    </div>
</nav>

<style>
.navbar-custom {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10, 10, 11, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 0;
}

.nav-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.25rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.125rem;
}

.logo-bracket {
    color: var(--accent);
}

.logo-text {
    color: var(--text-primary);
}

.logo-slash {
    color: var(--text-muted);
}

.logo-name {
    color: var(--text-secondary);
}

.nav-menu {
    display: flex;
    align-items: center;
    gap: 0.25rem;
}

.nav-link {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.625rem 1rem;
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.nav-icon {
    font-size: 1rem;
}

.nav-link:hover {
    color: var(--text-primary);
    background: rgba(99, 102, 241, 0.1);
}

.nav-link.active {
    color: var(--accent);
}

.nav-link-cv {
    background: var(--bg-card);
    border: 1px solid var(--border);
    margin-left: 0.5rem;
}

.nav-link-cv:hover {
    border-color: var(--accent);
    background: var(--accent-glow);
}

.nav-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
}

.nav-toggle span {
    width: 24px;
    height: 2px;
    background: var(--text-primary);
    transition: all 0.3s ease;
    border-radius: 2px;
}

@media (max-width: 768px) {
    .nav-toggle {
        display: flex;
    }
    
    .nav-menu {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        flex-direction: column;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        padding: 1rem;
        gap: 0.5rem;
        display: none;
    }
    
    .nav-menu.active {
        display: flex;
    }
    
    .nav-link {
        width: 100%;
        padding: 0.875rem 1rem;
    }
    
    .nav-link-cv {
        margin-left: 0;
        margin-top: 0.5rem;
        justify-content: center;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.getElementById('navToggle');
    const menu = document.getElementById('navMenu');
    
    toggle.addEventListener('click', function() {
        menu.classList.toggle('active');
    });
    
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
            menu.classList.remove('active');
        });
    });
});
</script>
