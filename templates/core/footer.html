<footer class="footer-custom">
    <div class="footer-container">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="footer-logo">
                    <span class="logo-bracket">&lt;</span>Dev<span class="logo-slash">/</span><span class="logo-name">Yecit</span><span class="logo-bracket">&gt;</span>
                </span>
                <p class="footer-tagline">Construyendo soluciones robustas, línea por línea.</p>
            </div>
            
            <div class="footer-links">
                <div class="footer-section">
                    <h4>Navegación</h4>
                    <a href="{% url 'home' %}">Inicio</a>
                    <a href="{% url 'sobremi' %}">Sobre mí</a>
                    <a href="{% url 'home' %}#proyectos">Proyectos</a>
                </div>
                
                <div class="footer-section">
                    <h4>Contacto</h4>
                    <div class="footer-social">
                        {% for red in redes %}
                            <a href="{{ red.url }}" target="_blank" rel="noopener noreferrer" class="social-link" title="{{ red.nombre }}">
                                <i class="{{ red.icono_bootstrap|default:'bi bi-link-45deg' }}"></i>
                            </a>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer-bottom">
            <div class="footer-divider"></div>
            <div class="footer-info">
                <span class="footer-copyright">
                    © {% now "Y" %} Yecit Torres. Todos los derechos reservados.
                </span>
                <span class="footer-made">
                    Hecho con <span class="heart">❤</span> y mucho café
                </span>
            </div>
        </div>
    </div>
</footer>

<style>
.footer-custom {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    padding: 4rem 0 2rem;
    margin-top: 6rem;
}

.footer-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem;
}

.footer-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    margin-bottom: 3rem;
}

.footer-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
}

.footer-logo .logo-bracket {
    color: var(--accent);
}

.footer-logo .logo-slash {
    color: var(--text-muted);
}

.footer-logo .logo-name {
    color: var(--text-secondary);
}

.footer-tagline {
    color: var(--text-muted);
    margin-top: 1rem;
    font-size: 0.95rem;
}

.footer-links {
    display: flex;
    gap: 4rem;
    justify-content: flex-end;
}

.footer-section h4 {
    color: var(--text-primary);
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1.25rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.footer-section a {
    display: block;
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 0.75rem;
    transition: color 0.3s ease;
}

.footer-section a:hover {
    color: var(--accent);
}

.footer-social {
    display: flex;
    gap: 0.75rem;
}

.social-link {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 1.1rem;
    transition: all 0.3s ease;
}

.social-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}

.footer-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 1.5rem;
}

.footer-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.footer-copyright {
    color: var(--text-muted);
    font-size: 0.85rem;
}

.footer-made {
    color: var(--text-muted);
    font-size: 0.85rem;
}

.heart {
    color: #ef4444;
    animation: heartbeat 1.5s infinite;
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

@media (max-width: 768px) {
    .footer-content {
        grid-template-columns: 1fr;
        gap: 2.5rem;
    }
    
    .footer-links {
        flex-direction: column;
        gap: 2rem;
        justify-content: flex-start;
    }
    
    .footer-info {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
    }
}
</style>

<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
</body>
</html>
